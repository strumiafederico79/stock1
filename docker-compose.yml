services:
  db:
    image: postgres:16-alpine
    container_name: stock-control-db
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-stock_db}
      POSTGRES_USER: ${POSTGRES_USER:-stock_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-stock_pass}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    expose:
      - '${POSTGRES_PORT:-5432}'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-stock_user} -d ${POSTGRES_DB:-stock_db}']
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    build:
      context: ./backend
    container_name: stock-control-backend
    environment:
      APP_NAME: ${APP_NAME:-Stock Control Pro}
      DEBUG: ${DEBUG:-false}
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg2://stock_user:stock_pass@db:5432/stock_db}
      CORS_ORIGINS_RAW: ${CORS_ORIGINS_RAW:-http://localhost,http://127.0.0.1,http://localhost:5173,http://127.0.0.1:5173,http://localhost:80}
      BARCODE_TYPE_DEFAULT: ${BARCODE_TYPE_DEFAULT:-CODE128}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-change-this-secret-key}
      JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-720}
      DEFAULT_ADMIN_USERNAME: ${DEFAULT_ADMIN_USERNAME:-admin}
      DEFAULT_ADMIN_PASSWORD: ${DEFAULT_ADMIN_PASSWORD:-admin1234}
      DEFAULT_ADMIN_FULL_NAME: ${DEFAULT_ADMIN_FULL_NAME:-Administrador General}
    depends_on:
      db:
        condition: service_healthy
    ports:
      - '${BACKEND_PORT:-8000}:8000'
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: ${VITE_API_URL:-/api/v1}
    container_name: stock-control-frontend
    depends_on:
      - backend
    ports:
      - '${FRONTEND_PORT:-80}:80'
    restart: unless-stopped

volumes:
  postgres_data:
