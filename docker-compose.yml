services:
  db:
    image: postgres:16-alpine
    container_name: stock-control-db
    environment:
      POSTGRES_DB: stock_db
      POSTGRES_USER: stock_user
      POSTGRES_PASSWORD: stock_pass
    volumes:
      - postgres_data:/var/lib/postgresql/data
    expose:
      - '5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U stock_user -d stock_db']
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    build:
      context: ./backend
    container_name: stock-control-backend
    environment:
      APP_NAME: Stock Control Pro
      DEBUG: 'false'
      DATABASE_URL: postgresql+psycopg2://stock_user:stock_pass@db:5432/stock_db
      CORS_ORIGINS_RAW: http://localhost,http://127.0.0.1,http://localhost:5173,http://127.0.0.1:5173,http://localhost:80
      BARCODE_TYPE_DEFAULT: CODE128
    depends_on:
      db:
        condition: service_healthy
    ports:
      - '8000:8000'
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: /api/v1
    container_name: stock-control-frontend
    depends_on:
      - backend
    ports:
      - '80:80'
    restart: unless-stopped

volumes:
  postgres_data:
